<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentry Orchestration — Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0d1420;
      --border: #1a2438;
      --accent: #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.08);
      --accent-glow: rgba(0, 229, 255, 0.25);
      --green: #00ffa3;
      --green-dim: rgba(0, 255, 163, 0.08);
      --orange: #ff9d00;
      --orange-dim: rgba(255, 157, 0, 0.08);
      --red: #ff4d6d;
      --text-1: #e8edf5;
      --text-2: #6b7a99;
      --text-3: #3a4560;
    }

    html, body {
      height: 100%;
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0, 229, 255, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .header-left { flex: 1; min-width: 220px; }

    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-2);
      max-width: 420px;
      line-height: 1.6;
    }

    /* ── Status badge ── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .pulse-ring {
      position: relative;
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }

    .pulse-ring::before, .pulse-ring::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .pulse-ring::before {
      background: var(--green);
    }

    .pulse-ring::after {
      background: var(--green);
      animation: pulse 2s ease-out infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.8); opacity: 0; }
    }

    .status-badge.error .pulse-ring::before,
    .status-badge.error .pulse-ring::after { background: var(--red); }

    .status-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
    }

    .status-badge.ok .status-text { color: var(--green); }
    .status-badge.error .status-text { color: var(--red); }

    /* ── Metric cards row ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    @media (max-width: 560px) {
      .metrics { grid-template-columns: 1fr; }
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .metric-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
    }

    .metric-value.small { font-size: 14px; }

    /* ── Section title ── */
    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Integration grid ── */
    .integrations {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .integration-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    .integration-card:hover {
      transform: translateY(-2px);
    }

    .integration-card.active {
      border-color: rgba(0, 255, 163, 0.25);
      background: linear-gradient(135deg, var(--surface), rgba(0, 255, 163, 0.04));
    }

    .integration-card.inactive {
      border-color: var(--border);
      opacity: 0.55;
    }

    .integration-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .integration-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
    }

    .integration-state {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .integration-state.ok {
      background: var(--green-dim);
      color: var(--green);
    }

    .integration-state.pending {
      background: var(--orange-dim);
      color: var(--orange);
    }

    /* ── Links row ── */
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .link-btn.primary {
      background: var(--accent-dim);
      border-color: rgba(0, 229, 255, 0.3);
      color: var(--accent);
    }

    .link-btn.primary:hover {
      background: rgba(0, 229, 255, 0.15);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .link-btn.secondary {
      background: transparent;
      border-color: var(--border);
      color: var(--text-2);
    }

    .link-btn.secondary:hover {
      border-color: var(--text-2);
      color: var(--text-1);
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
    }

    footer span { color: var(--text-2); }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #1e2d47 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      display: inline-block;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="header-left">
        <p class="label">// Agent Orchestration Platform</p>
        <h1>Sentry <span>Orch</span></h1>
        <p class="subtitle" id="app-description">Carregando informações da aplicação...</p>
      </div>
      <div class="status-badge" id="status-badge">
        <div class="pulse-ring"></div>
        <span class="status-text">VERIFICANDO...</span>
      </div>
    </header>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">Uptime</div>
        <div class="metric-value" id="metric-uptime">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ambiente</div>
        <div class="metric-value small" id="metric-env">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Última verificação</div>
        <div class="metric-value small" id="metric-timestamp">—</div>
      </div>
    </div>

    <p class="section-title">Integrações</p>
    <div class="integrations" id="integrations-grid">
      <!-- populated via JS -->
    </div>

    <p class="section-title">Acesso rápido</p>
    <div class="links">
      <a class="link-btn primary" href="/docs" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Swagger Docs
      </a>
      <a class="link-btn secondary" href="/health" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Health Check
      </a>
      <a class="link-btn secondary" href="/info" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        App Info
      </a>
    </div>
  </main>

  <footer>
    Atualiza automaticamente a cada <span>30s</span> &nbsp;·&nbsp;
    prj-tst-sentry-02 <span>v0.1.0</span>
  </footer>

  <script>
    const ICONS = {
      Sentry:    { emoji: '🛡️', bg: '#3a1a2a' },
      GitHub:    { emoji: '🐙', bg: '#1a1a2a' },
      N8N:       { emoji: '⚡', bg: '#1a2a1a' },
      'Groq LLM':{ emoji: '🧠', bg: '#1a1a3a' },
      Slack:     { emoji: '💬', bg: '#1a2a2a' },
    };

    function formatUptime(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return h + 'h ' + m + 'm';
    }

    function formatTime(iso) {
      const d = new Date(iso);
      return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    async function fetchStatus() {
      const badge   = document.getElementById('status-badge');
      const uptime  = document.getElementById('metric-uptime');
      const env     = document.getElementById('metric-env');
      const ts      = document.getElementById('metric-timestamp');
      const desc    = document.getElementById('app-description');
      const grid    = document.getElementById('integrations-grid');

      try {
        const [health, info] = await Promise.all([
          fetch('/health').then(r => r.json()),
          fetch('/info').then(r => r.json()),
        ]);

        badge.className = 'status-badge ok';
        badge.innerHTML = '<div class="pulse-ring"></div><span class="status-text">ONLINE</span>';

        uptime.textContent  = formatUptime(health.uptime);
        env.textContent     = (info.environment || 'development').toUpperCase();
        ts.textContent      = formatTime(health.timestamp);
        desc.textContent    = info.description;

        grid.innerHTML = info.integrations.map(({ name, configured }) => {
          const icon = ICONS[name] || { emoji: '🔌', bg: '#1a2030' };
          const state = configured ? 'ok' : 'pending';
          const stateLabel = configured ? 'configurado' : 'pendente';
          return `
            <div class="integration-card ${state}">
              <div class="integration-icon" style="background:${icon.bg}">${icon.emoji}</div>
              <div class="integration-name">${name}</div>
              <div class="integration-state ${state}">${stateLabel}</div>
            </div>
          `;
        }).join('');

      } catch {
        badge.className = 'status-badge error';
        badge.innerHTML = '<div class="pulse-ring"></div><span class="status-text">OFFLINE</span>';
        uptime.textContent = '—';
        env.textContent    = '—';
        ts.textContent     = formatTime(new Date().toISOString());
      }
    }

    fetchStatus();
    setInterval(fetchStatus, 30_000);
  </script>
</body>
</html>
